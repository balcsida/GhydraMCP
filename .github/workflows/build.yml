name: Build Ghidra Plugin

on:
  push:
    branches: [ main, 'feat/*', 'fix/*' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Get latest Ghidra release
      id: ghidra-release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        ASSET_NAME=$(gh api repos/NationalSecurityAgency/ghidra/releases/latest --jq '.assets[] | select(.name | endswith(".zip")) | .name' | head -1)
        DOWNLOAD_URL=$(gh api repos/NationalSecurityAgency/ghidra/releases/latest --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
        # Extract version from filename like ghidra_12.0.4_PUBLIC_20260303.zip
        GHIDRA_VERSION=$(echo "$ASSET_NAME" | sed -E 's/ghidra_([0-9.]+)_PUBLIC_.*/\1/')
        echo "version=$GHIDRA_VERSION" >> "$GITHUB_OUTPUT"
        echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
        echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
        # Use version as cache key
        echo "Detected latest Ghidra: $GHIDRA_VERSION ($ASSET_NAME)"

    - name: Cache Ghidra
      id: cache-ghidra
      uses: actions/cache@v5
      with:
        path: /opt/ghidra
        key: ghidra-${{ steps.ghidra-release.outputs.version }}

    - name: Download and install Ghidra
      if: steps.cache-ghidra.outputs.cache-hit != 'true'
      run: |
        wget -q "${{ steps.ghidra-release.outputs.download_url }}" -O /tmp/ghidra.zip
        unzip -q /tmp/ghidra.zip -d /opt
        # The extracted folder name varies, find it dynamically
        GHIDRA_DIR=$(find /opt -maxdepth 1 -name "ghidra_*" -type d | head -1)
        mv "$GHIDRA_DIR" /opt/ghidra

    - name: Build with Maven
      env:
        GHIDRA_HOME: /opt/ghidra
      run: mvn -B package

    - name: Upload nightly artifacts
      if: github.ref_type != 'tag'
      uses: actions/upload-artifact@v7
      with:
        name: GhydraMCP-nightly
        path: |
          target/GhydraMCP-*.zip
          bridge_mcp_hydra.py

    - name: Create Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        name: GhydraMCP ${{ github.ref_name }}
        files: |
          target/GhydraMCP-*.zip
          bridge_mcp_hydra.py
        draft: false
        prerelease: false
