name: Build Ghidra Plugin

on:
  push:
    branches: [ main, 'feat/*', 'fix/*' ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  GHIDRA_VERSION: "11.4.2"
  GHIDRA_DATE: "20250611"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Ghidra
      id: cache-ghidra
      uses: actions/cache@v4
      with:
        path: /opt/ghidra
        key: ghidra-${{ env.GHIDRA_VERSION }}-${{ env.GHIDRA_DATE }}

    - name: Download and install Ghidra
      if: steps.cache-ghidra.outputs.cache-hit != 'true'
      run: |
        wget -q "https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/ghidra_${GHIDRA_VERSION}_PUBLIC_${GHIDRA_DATE}.zip" -O /tmp/ghidra.zip
        unzip -q /tmp/ghidra.zip -d /opt
        mv /opt/ghidra_${GHIDRA_VERSION}_PUBLIC /opt/ghidra

    - name: Build with Maven
      env:
        GHIDRA_HOME: /opt/ghidra
      run: mvn -B package

    - name: Upload nightly artifacts
      if: github.ref_type != 'tag'
      uses: actions/upload-artifact@v4
      with:
        name: GhydraMCP-nightly
        path: |
          target/GhydraMCP-*.zip
          bridge_mcp_hydra.py

    - name: Create Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        name: GhydraMCP ${{ github.ref_name }}
        files: |
          target/GhydraMCP-*.zip
          bridge_mcp_hydra.py
        draft: false
        prerelease: false
